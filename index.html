<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>PDF Processing Studio</title>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
			rel="stylesheet"
			integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
			crossorigin="anonymous"
		/>
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
			integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7o6xE9s+4z9qXr7h7Xw=="
			crossorigin="anonymous"
			referrerpolicy="no-referrer"
		/>
		<link rel="stylesheet" href="styles.css?version=0.0.15" />
	</head>
	<body>
		<nav class="navbar navbar-expand-lg">
			<div class="container-fluid px-4">
				<span class="navbar-brand">PDF Processing Studio</span>
				<span class="session-badge">Session: <span id="sessionId"></span></span>
			</div>
		</nav>

		<main class="container-fluid py-4">
			<div class="row g-4">
				<div class="col-lg-3">
					<div class="card sidebar-card p-3">
						<h5 class="section-title">Quick Actions</h5>
						<p class="text-muted">Upload PDFs or images, then choose a tool.</p>
						<div class="d-grid gap-2 mb-3">
							<button class="btn btn-primary action-btn" id="uploadBtn">
								<i class="fa-solid fa-cloud-arrow-up"></i>
								Upload PDFs
							</button>
							<button class="btn btn-outline-secondary action-btn" id="refreshBtn">
								<i class="fa-solid fa-rotate"></i>
								Refresh Grid
							</button>
							<button class="btn btn-outline-info action-btn" id="generateThumbsBtn">
								<i class="fa-solid fa-image"></i>
								Generate Thumbnails
							</button>
						</div>

						<div class="mb-3">
							<h6 class="section-title">Selection</h6>
							<div id="selectedList" class="selection-panel"></div>
						</div>

						<div class="d-grid gap-2">
							<button class="btn btn-success action-btn" id="mergeBtn">
								<i class="fa-solid fa-object-group"></i>
								Merge Selected
							</button>
							<button class="btn btn-warning action-btn" id="splitBtn">
								<i class="fa-solid fa-scissors"></i>
								Split Selected
							</button>
							<button class="btn btn-outline-primary action-btn" id="imagesBtn">
								<i class="fa-regular fa-image"></i>
								Images to PDF
							</button>
							<button class="btn btn-outline-dark action-btn" id="pdfToImagesBtn">
								<i class="fa-solid fa-file-image"></i>
								PDF to Images
							</button>
						</div>
					</div>
				</div>

				<div class="col-lg-9">
					<div class="d-flex align-items-center justify-content-between mb-3">
						<div>
							<h4 class="mb-0">Project PDFs</h4>
							<small class="text-muted">Click preview to open a PDF, or tick boxes to process.</small>
						</div>
						<div class="d-flex align-items-center gap-2">
							<label for="sessionFilter" class="form-label mb-0 text-muted">Path</label>
							<select id="sessionFilter" class="form-select form-select-sm">
								<option value="all">All</option>
							</select>
						</div>
					</div>

					<div class="row g-3" id="pdfGrid"></div>
				</div>
			</div>
		</main>

		<input type="file" id="uploadInput" accept="application/pdf" multiple hidden />
		<input type="file" id="imagesInput" accept="image/*" multiple hidden />

		<div class="modal fade" id="previewModal" tabindex="-1" aria-hidden="true">
			<div class="modal-dialog modal-xl modal-dialog-centered">
					<div class="modal-content">
						<div class="modal-header preview-modal-header">
							<div class="preview-title-wrap">
								<h5 class="modal-title" id="previewTitle"></h5>
							</div>
							<div class="preview-actions d-flex align-items-center gap-2">
								<button type="button" class="btn btn-sm btn-outline-secondary" id="previewArrange" title="Arrange pages">
									<img src="/files/assets/icons/arrange.png" alt="Arrange pages" width="16" height="16" /> Arrange Pages
								</button>
								<button type="button" class="btn btn-sm btn-outline-secondary" id="previewRotateLeft" title="Rotate counter-clockwise">
									<img src="/files/assets/icons/rotate-counter-clockwise.png" alt="Rotate counter-clockwise" width="16" height="16" />
								</button>
								<button type="button" class="btn btn-sm btn-outline-secondary" id="previewRotateRight" title="Rotate clockwise">
									<img src="/files/assets/icons/rotate-clockwise.png" alt="Rotate clockwise" width="16" height="16" />
								</button>
								<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
							</div>
					</div>
					<div class="modal-body">
						<iframe id="previewFrame" title="PDF Preview"></iframe>
					</div>
				</div>
			</div>
		</div>

		<div class="modal fade" id="arrangeModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
			<div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
				<div class="modal-content">
					<div class="modal-header">
						<h5 class="modal-title">Arrange Pages</h5>
						<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
					</div>
					<div class="modal-body">
						<div class="text-muted mb-3">Drag and drop pages to reorder them.</div>
						<div id="arrangeGrid" class="arrange-grid"></div>
					</div>
					<div class="modal-footer">
						<button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
						<button type="button" class="btn btn-primary" id="arrangeConfirm">Arrange</button>
					</div>
				</div>
			</div>
		</div>

		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.js"></script>
		<script src="app.js?version=0.0.15"></script>
	</body>
</html>
